name: Build technical brief

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: Generate governed evidence brief
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Download licensed real data
        run: python scripts/download_data.py

      - name: Run governed analytical pipeline
        run: python scripts/run_pipeline.py --all

      - name: Build technical brief
        run: python scripts/build_brief.py

      - name: Upload brief and evidence
        uses: actions/upload-artifact@v4
        with:
          name: industrial-adaptive-energy-intelligence-evidence
          path: |
            outputs/brief/*.pdf
            outputs/charts/*
            outputs/tables/*
            outputs/report_payload.json
          if-no-files-found: error
          retention-days: 14
