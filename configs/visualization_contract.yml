visualization:
  engine: matplotlib
  output_format: png
  dpi: 300
  background: light
  color_accessibility: colorblind_conscious
  default_dimensions_inches: [11.0, 6.4]
  font_family: DejaVu Sans
  minimum_font_size_pt: 8
  title_size_pt: 15
  subtitle_size_pt: 10
  axis_label_size_pt: 9
  tick_size_pt: 8
  line_width_pt: 1.8
  grid_alpha: 0.18
  footer_required: true
  footer_fields:
    - figure_id
    - source
    - sample
    - generated_utc
  forbid:
    - dark_background
    - three_dimensional_effects
    - decorative_gradients
    - unexplained_dual_axes
    - truncated_axes_without_disclosure
    - synthetic_or_placeholder_data
    - unsupported_causal_language
    - company_branding
    - unsupported_structural_drift_result
    - optimization_without_machine_readable_evidence
    - business_impact_without_explicit_assumptions
  brief_figures:
    page_1:
      filename: confirmatory_forecasting_verdict.png
      purpose: Candidate-versus-persistence performance, peak-state robustness, and the closed confirmatory verdict.
    page_2:
      filename: governed_data_architecture.png
      purpose: Provenance, data quality, analytical-layer construction, and portable execution controls.
    page_3:
      filename: model_ladder_chronological_validation.png
      purpose: Benchmark evidence, candidate promotion decisions, chronological folds, and validation-only selection.
    page_4:
      filename: locked_test_temporal_stability.png
      purpose: Prespecified temporal-block performance, peak-state results, and exact evaluation boundaries.
    page_5:
      filename: evidence_governance_model_boundaries.png
      purpose: Gate lineage, artifact identity, single-evaluation controls, and explicit model boundaries.
  publication_gate:
    required_brief_figures: 5
    minimum_width_pixels: 2400
    minimum_height_pixels: 1200
    minimum_file_size_bytes: 30000
    no_placeholder_labels: true
    source_note_required: true
    units_required: true
    sample_dates_required: true
    terminal_metric_reconciliation_required: true
